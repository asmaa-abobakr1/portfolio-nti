<footer>
  <a routerLink="/" class="logo">
    <img src="imgs/logo.png" alt="Asmaa Logo">
  </a>
  <p>Full Stack Developer crafting beautiful and functional web experiences.</p>

  <ul class="footpages">
    @for (link of links; track link.path; let last = $last) {
      <li><a [routerLink]="link.path">{{ link.label }}</a></li>
      @if (!last) {
        <li><i class="fa fa-heart heart-icon" aria-hidden="true"></i></li>
      }
    }
  </ul>

  <h3 class="footbold ready">Ready To Work With Me ?</h3>
  <div class="scroll-down">
    <i class="fa-solid fa-chevron-down"></i>
    <i class="fa-solid fa-chevron-down"></i>
    <i class="fa-solid fa-chevron-down"></i>
  </div>

  <a routerLink="/contact" class="b2">
    Let's Get In Touch
    <i class="fa fa-heart heart-icon" aria-hidden="true"></i>
  </a>
  <p class="footpara">&copy; 2026 Asmaa. All rights reserved.</p>
</footer>
